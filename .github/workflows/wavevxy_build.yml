name: BUILD WAVEVXY MAESTRO

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'

      - name: 🧛‍♂️ Konfigurasi Kasta Maestro
        run: |
          # Ganti Nama APK
          sed -i 's/android:label="[^"]*"/android:label="WaveVXY"/g' android/app/src/main/AndroidManifest.xml
          # Bypass SDK & AAPT2
          echo "android.experimental.checkDependenciesMetadata=false" >> android/gradle.properties
          sed -i 's/compileSdk = [0-9]*/compileSdk = 35/g' android/app/build.gradle.kts || sed -i 's/compileSdk [0-9]*/compileSdk 35/g' android/app/build.gradle

      - name: 🧛‍♂️ Rakit APK
        run: |
          flutter pub get
          flutter build apk --debug --target-platform android-arm64 --no-tree-shake-icons --android-skip-build-dependency-validation

      - name: 🧛‍♂️ Simpan WaveVXY
        uses: actions/upload-artifact@v4
        with:
          name: WaveVXY-Final
          path: build/app/outputs/flutter-apk/app-debug.apk
          
